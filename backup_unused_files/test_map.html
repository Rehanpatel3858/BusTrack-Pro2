<!DOCTYPE html>
<html>
<head>
    <title>Mira Bhayandar Map Test</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; text-align: center; }
        header { background: #1a73e8; color: white; padding: 10px; }
        /* This MUST have a height or the map will be invisible! */
        #map { 
            height: 500px; 
            width: 90%; 
            margin: 20px auto; 
            border: 5px solid #333;
            background-color: #ddd; /* This shows if the map hasn't loaded yet */
        }
    </style>
</head>
<body>

    <header>
        <h1>🚍 MB BusTrack: Test View</h1>
        <p>If you see a map of Mira Road below, your internet is working!</p>
    </header>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // We will initialize the map WITHOUT Firebase first to test it
        try {
            console.log("Initializing Map...");
            // Mira Road Coordinates
            var map = L.map('map').setView([19.2813, 72.8557], 15);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);

            L.marker([19.2813, 72.8557]).addTo(map)
                .bindPopup('Bus MB-01 Starting Point')
                .openPopup();
            
            console.log("Map Loaded Successfully!");
        } catch (error) {
            console.error("Map failed to load:", error);
        }
    </script>
</body>
</html>
